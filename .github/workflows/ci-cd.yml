name: CI/CD Pipeline

on:
  push:
    branches:
      - master

jobs:

  java-tests:
    name: Java Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Run Java tests
        working-directory: alert_gateway
        run: mvn verify
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}


  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: incident_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: agent_swarm/requirements.txt

      - name: Install PostgreSQL client
        run: sudo apt-get install -y postgresql-client

      - name: Install dependencies
        working-directory: agent_swarm
        run: pip install -r requirements.txt

      - name: Run DB seed                        
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d incident_db \
            -f agent_swarm/tests/seed.sql

      - name: Validate Python Environment (Skip Tests)
        working-directory: agent_swarm
        run: echo "Skipping tests to preserve API limits. Dependencies and DB seeded successfully."