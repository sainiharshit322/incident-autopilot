name: CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [master]

jobs:


  java-tests:
    name: Java Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Run Java tests
        working-directory: alert_gateway
        run: mvn verify
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}


  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: incident_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: agent_swarm/requirements.txt

      - name: Install PostgreSQL client
        run: sudo apt-get install -y postgresql-client

      - name: Install dependencies
        working-directory: agent_swarm
        run: pip install -r requirements.txt

      - name: Run DB seed                          # ← replaces the old extension step
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d incident_db \
            -f agent-swarm/tests/seed.sql

      - name: Run Python tests
        working-directory: agent_swarm
        run: pytest tests/ -v
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/incident_db


  security-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    needs: [java-tests, python-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ./alert_gateway
          severity: CRITICAL,HIGH
          exit-code: 1
          format: table


  deploy:
    name: Deploy Signal
    runs-on: ubuntu-latest
    needs: [security-scan]
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Deployment approved
        run: echo "All checks passed. Railway auto-deploy triggered on main branch push."