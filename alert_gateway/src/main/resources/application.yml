spring:
  application:
    name: alert-gateway

  datasource:
    url: jdbc:postgresql://localhost:5432/incidentdb
    username: incident
    password: incident123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

jwt:
  secret: incident-autopilot-secret-key-must-be-at-least-32-characters-long
  expiration-ms: 3600000